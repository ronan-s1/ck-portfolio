<!DOCTYPE html>
<html lang="en">
<head>

<body class="minimal-body">
    <!-- Minimal fixed nav -->
    <nav class="minimal-nav">

        </a>
        <!-- Hamburger menu for mobile -->
        <button class="navbar-toggler d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav" aria-controls="offcanvasNav" aria-label="Toggle navigation">
            <span class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>
        <!-- Desktop menu -->

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNav" aria-labelledby="offcanvasNavLabel">

        <div class="offcanvas-body">
            <nav class="nav flex-column">
                <a class="nav-link" href="index.html">Home</a>

            </nav>
        </div>

    <main class="minimal-main">
        <!-- Large hero image section -->
        <section class="image-hero" id="hero">
            <div class="hero-image-large">
                <img id="hero-img"
                     src="images/work/musical_chairs.jpeg"
                     alt="Musical Chairs — oil painting by Clarissa Kelly"
                     fetchpriority="high"
                     width="2794"
                     height="3376">
            </div>
            <div class="hero-text-overlay fade-in-up">
                <h1 class="hero-signature-title">
                    <img src="images/home/ck.png"
                         alt="Clarissa Kelly"
                         width="409"
                         height="109"
                         decoding="async">
                </h1>
            </div>

        </section> -->

            <span>© <span id="year"></span> Clarissa Kelly</span>
            <div class="footer-links">
                <a href="contact.html">Get in touch</a>
            </div>
        </footer>
